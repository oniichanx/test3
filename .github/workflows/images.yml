name: Generate image list

on:
  push:
    paths:
      - "wallpaper/**"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate images.json
        run: |
          echo "[" > images.json
          first=1

          for file in $(find wallpaper -type f -name "*.*" | sort); do
            rel=$(echo "$file" | sed 's|^wallpaper/||')

            # ⭐ กันไฟล์แปลก เช่น (1).jpg ที่ไม่มี path จริง
            if [ ! -f "$file" ]; then
              continue
            fi

            # ⭐ ดึงนามสกุล (ไว้ใช้ในอนาคต เช่น video)
            ext="${file##*.}"

            # ⭐ วันที่เพิ่มไฟล์ครั้งแรก
            date=$(git log --diff-filter=A --format="%cs" -1 -- "$file")

            # ⭐ ถ้าไม่มี date ให้ข้าม (กัน JSON เละ)
            if [ -z "$date" ]; then
              continue
            fi

            if [ $first -eq 0 ]; then
              echo "," >> images.json
            fi

            echo "{\"url\":\"$rel\",\"type\":\"$ext\",\"date\":\"$date\"}" >> images.json
            first=0
          done

          echo "]" >> images.json

      - name: Commit
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add images.json
          git commit -m "update images" || echo "no change"
          git push