name: Generate image list

on:
  push:
    paths:
      - "wallpaper/**"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate images.json
        run: |
          echo "[" > images.json
          first=1

          find wallpaper -type f -name "*.*" | sort | while IFS= read -r file; do
            rel=$(echo "$file" | sed 's|^wallpaper/||')

            # กันไฟล์พัง
            if [ ! -f "$file" ]; then
              continue
            fi

            ext="${file##*.}"

            # วันที่เพิ่มไฟล์ครั้งแรก
            date=$(git log --diff-filter=A --format="%cs" -1 -- "$file")

            # ถ้าไม่มี date ให้ข้าม
            if [ -z "$date" ]; then
              continue
            fi

            if [ $first -eq 0 ]; then
              echo "," >> images.json
            fi

            echo "{\"url\":\"$rel\",\"type\":\"$ext\",\"date\":\"$date\"}" >> images.json
            first=0
          done

          echo "]" >> images.json

      - name: Commit
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add images.json
          git commit -m "update images" || echo "no change"
          git push