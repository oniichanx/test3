<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Image Serenity</title>

<link rel="stylesheet" href="style.css?v=4">

</head>

<body>

<header>
<h1>Image Serenity</h1>
<p>Curated wallpaper collection</p>
</header>

<div id="filterBar"></div>

<div class="gallery" id="gallery"></div>

<div id="lightbox">
<button id="prev">‹</button>
<img id="lightbox-img">
<button id="next">›</button>
<a id="download" download>Download</a>
</div>

<!-- filter popup -->
<div id="filterPopup">
  <button class="fpBtn active" data-key="all"       data-tip="ทั้งหมด">🖼️</button>
  <button class="fpBtn"        data-key="landscape"  data-tip="แนวนอน">🖥️</button>
  <button class="fpBtn"        data-key="portrait"   data-tip="แนวตั้ง">📱</button>
  <button class="fpBtn"        data-key="mobile"     data-tip="มือถือ">🔲</button>
</div>

<!-- FAB buttons -->
<button id="topBtn"    class="fab">↑</button>
<button id="filterFab" class="fab">⊞</button>
<button id="themeBtn"  class="fab">🌙</button>

<script src="script.js?v=5"></script>

</body>
</html>
